<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudrend SMP | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { background-color: #FEF7FF; color: #1C1B1F; font-family: sans-serif; }
        .spinner { border: 4px solid #EADDFF; border-top: 4px solid #6750A4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loader" class="fixed inset-0 z-[100] bg-[#FEF7FF] flex flex-col items-center justify-center gap-4">
        <div class="spinner"></div>
        <p class="text-[#6750A4] font-medium animate-pulse">Checking session...</p>
    </div>

    <div id="banned-screen" class="hidden fixed inset-0 z-[90] bg-[#FFF8F7] flex flex-col items-center justify-center p-6 text-center">
        <span class="material-symbols-outlined text-[#BA1A1A] text-7xl mb-4">gavel</span>
        <h1 class="text-4xl font-bold text-[#1C1B1F] mb-2">Access Revoked</h1>
        <div class="bg-[#F3EDF7] p-6 rounded-[28px] border border-[#BA1A1A]/20 mb-6 max-w-md">
            <p id="ban-reason" class="text-[#410002] font-mono">Reason loading...</p>
        </div>
        <button onclick="logout()" class="px-8 py-3 bg-[#BA1A1A] text-white rounded-full font-medium shadow-lg active:scale-95 transition-all">Sign Out</button>
    </div>

    <nav class="h-20 flex justify-between items-center px-8 border-b border-[#CAC4D0]">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#6750A4] rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-white">cloud</span>
            </div>
            <span class="text-xl font-bold tracking-tight">Cloudrend Hub</span>
        </div>
        <div id="user-nav">
            <button onclick="openModal()" class="bg-[#6750A4] text-white px-6 py-2 rounded-full text-sm font-medium hover:shadow-md transition-all">Login</button>
        </div>
    </nav>

    <main class="flex-1 p-8 max-w-6xl mx-auto w-full">
        <div class="mb-12">
            <h1 class="text-5xl font-light mb-4">Welcome back, <span id="display-name" class="font-bold text-[#6750A4]">Player</span></h1>
            <p class="text-[#49454F]">Your central gateway to the Cloudrend SMP ecosystem.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-[#F3EDF7] p-8 rounded-[32px] hover:bg-[#EADDFF] transition-colors cursor-pointer group">
                <span class="material-symbols-outlined text-[#6750A4] mb-4">dns</span>
                <h3 class="text-xl font-bold mb-2">Server Status</h3>
                <p class="text-sm text-[#49454F]">Neon Database: Connected</p>
            </div>
            </div>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
        <div class="bg-[#F7F2FA] w-full max-w-sm rounded-[28px] p-8 shadow-2xl scale-in">
            <h2 class="text-2xl font-normal text-center mb-8">SMP Portal</h2>
            <div class="space-y-4">
                <input id="u-in" type="text" placeholder="Username" class="w-full h-14 border border-[#79747E] rounded-md bg-transparent px-4 outline-none focus:border-2 focus:border-[#6750A4]">
                <input id="p-in" type="password" placeholder="Password" class="w-full h-14 border border-[#79747E] rounded-md bg-transparent px-4 outline-none focus:border-2 focus:border-[#6750A4]">
                <button onclick="auth()" class="w-full h-12 bg-[#6750A4] text-white rounded-full font-medium active:scale-95 transition-all">Connect</button>
                <button onclick="closeModal()" class="w-full h-12 text-[#6750A4] font-medium">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const banned = document.getElementById('banned-screen');

        window.onload = () => {
            const session = localStorage.getItem('smp_session');
            if (session) {
                const user = JSON.parse(session);
                document.getElementById('display-name').innerText = user.username;
                if (user.status === 'banned') {
                    document.getElementById('ban-reason').innerText = user.ban_reason;
                    banned.classList.remove('hidden');
                }
                document.getElementById('user-nav').innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-bold text-[#6750A4]">${user.username}</span>
                        <button onclick="logout()" class="material-symbols-outlined text-[#49454F]">logout</button>
                    </div>`;
            }
            loader.classList.add('hidden');
        };

        async function auth() {
            loader.classList.remove('hidden');
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('u-in').value, password: document.getElementById('p-in').value})
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('smp_session', JSON.stringify(data));
                location.reload();
            } else {
                alert(data.error);
                loader.classList.add('hidden');
            }
        }

        function logout() { localStorage.removeItem('smp_session'); location.reload(); }
        function openModal() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('login-modal').classList.add('hidden'); }
    </script>
</body>
</html>
